version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./server:/app
      - ./playbooks:/app/playbooks
      - ./integrations:/app/integrations
    networks:
      - kirov-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=kirov
      - POSTGRES_PASSWORD=kirov
      - POSTGRES_DB=automation_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kirov"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kirov-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - kirov-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=kirov
      - RABBITMQ_DEFAULT_PASS=kirov
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - kirov-network
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.23
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgresql
      - POSTGRES_USER=kirov
      - POSTGRES_PASSWORD=kirov
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kirov-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  kirov-network:
    driver: bridge
